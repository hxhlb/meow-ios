name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint --strict --reporter github-actions-logging
      - name: SwiftFormat (check)
        run: |
          brew install swiftformat
          swiftformat --lint .

  build-core:
    # PRD v1.1: single pure-Rust MeowCore.xcframework — no Go toolchain.
    # meow-rs is pulled as a cargo git dependency (pinned via Cargo.lock),
    # not a submodule, so no --recurse-submodules here.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust (stable + iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Cache cargo registry, git, and build target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/rust/meow-ios-ffi/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/rust/meow-ios-ffi/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: Build MeowCore.xcframework
        run: scripts/build-rust.sh
      - name: Enforce size budget (≤ 8 MB stripped — see TEST_STRATEGY §8.1)
        run: |
          # test $(stat -f %z MeowCore/Frameworks/MeowCore.xcframework/ios-arm64/libmeow_ios_ffi.a) -lt 8388608
          echo "Size gate placeholder — stripped-binary enforcement lives in the archive job (PacketTunnel.appex); raw-.a gate lands with T1.4."
      - uses: actions/upload-artifact@v4
        with:
          name: MeowCore.xcframework
          path: MeowCore/Frameworks/MeowCore.xcframework
          if-no-files-found: error

  unit-test:
    needs: [build-core]
    # macos-15: required for Xcode 26 / Swift 6.2, which MeowShared/Package.swift
    # pins via `swift-tools-version: 6.2`. The macos-14 image ships Xcode 15.x /
    # Swift 5.10 and rejects the manifest at parse time — previously this job
    # failed in ~17s with an unreadable Package.swift error that masked as a
    # generic CI red. See task #34(a) for the triage trail.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ^26.0
      - uses: actions/download-artifact@v4
        with:
          name: MeowCore.xcframework
          path: MeowCore/Frameworks/MeowCore.xcframework
      - name: Generate project
        run: |
          brew install xcodegen
          xcodegen generate
      - name: Test MeowShared package
        run: |
          cd MeowShared && swift test
      - name: Test meow-ios unit bundle
        run: |
          xcodebuild test \
            -project meow-ios.xcodeproj \
            -scheme meow-ios \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -only-testing:MeowTests \
            -resultBundlePath build/unit.xcresult \
            -enableCodeCoverage YES \
            | xcbeautify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-xcresult
          path: build/unit.xcresult

  ui-test:
    needs: [build-core]
    # Same Xcode 26 / Swift 6.2 requirement as unit-test — xcodebuild resolves
    # the MeowShared local SPM package (tools-version 6.2) before building
    # the app host for XCUITest.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ^26.0
      - uses: actions/download-artifact@v4
        with:
          name: MeowCore.xcframework
          path: MeowCore/Frameworks/MeowCore.xcframework
      - name: Generate project
        run: |
          brew install xcodegen
          xcodegen generate
      - name: Run UI tests
        run: |
          xcodebuild test \
            -project meow-ios.xcodeproj \
            -scheme meow-ios \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -only-testing:MeowUITests \
            -resultBundlePath build/ui.xcresult \
            | xcbeautify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-xcresult
          path: build/ui.xcresult

  archive:
    needs: [build-core, unit-test, ui-test]
    # Same Xcode 26 / Swift 6.2 requirement — the Release archive
    # re-resolves MeowShared's SPM package.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ^26.0
      - uses: actions/download-artifact@v4
        with:
          name: MeowCore.xcframework
          path: MeowCore/Frameworks/MeowCore.xcframework
      - name: Archive (no signing on PR)
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild archive \
            -project meow-ios.xcodeproj \
            -scheme meow-ios \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/meow-ios.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
      - name: Enforce PacketTunnel.appex size budget (TEST_STRATEGY §8.1)
        run: |
          set -euo pipefail
          BIN="build/meow-ios.xcarchive/Products/Applications/meow-ios.app/PlugIns/PacketTunnel.appex/PacketTunnel"
          if [ ! -f "$BIN" ]; then
            echo "::error::PacketTunnel binary not found at $BIN"
            ls -R build/meow-ios.xcarchive/Products || true
            exit 1
          fi
          # Ceiling history: 8 → 10 MB (2026-05, meow-rs v0.7.x bump) →
          # 20 MB (2026-05, warn 9 → 18). The 10 → 20 step gives generous
          # headroom over the meow-rs v0.11 + boring-tls/ECH (RFC 9460)
          # footprint (BoringSSL is vendored by boring-sys for ECH + uTLS
          # fingerprinting; current binary ~11.1 MB) so routine meow-rs bumps
          # stop re-tripping this proxy gate.
          #
          # Binary on-disk is only a PROXY heuristic (TEST_STRATEGY §8.1) — the
          # real ship gate is the NE process's ~50 MB *resident memory* jetsam
          # cap (NOT the stale ~15 MB this comment used to cite; corrected per
          # PR #140). Code is demand-paged, so an 11 MB binary is nowhere near
          # 11 MB resident: measured RSS under sustained TCP-flow churn is
          # ~31 MB, well within the ≤ 45 MB peak target. This gate just guards
          # against runaway on-disk bloat; RSS is the ship-blocker.
          LIMIT=$((20 * 1024 * 1024))
          WARN=$((18 * 1024 * 1024))
          SIZE=$(stat -f %z "$BIN")
          MB=$(awk "BEGIN {printf \"%.2f\", ${SIZE}/1048576}")
          HEADROOM=$((LIMIT - SIZE))
          HEADROOM_MB=$(awk "BEGIN {printf \"%.2f\", ${HEADROOM}/1048576}")
          STATUS="pass"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            STATUS="fail"
          elif [ "$SIZE" -gt "$WARN" ]; then
            STATUS="warn"
          fi
          echo "PacketTunnel stripped binary: ${SIZE} bytes (${MB} MB), headroom ${HEADROOM_MB} MB [${STATUS}]"

          {
            echo "### PacketTunnel.appex size — TEST_STRATEGY §8.1"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Stripped binary | **${MB} MB** (${SIZE} bytes) |"
            echo "| Ceiling | 20.00 MB |"
            echo "| Soft warning | 18.00 MB |"
            echo "| Headroom | ${HEADROOM_MB} MB |"
            echo "| Status | \`${STATUS}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATUS" = "fail" ]; then
            echo "::error::PacketTunnel exceeds 20 MB ceiling (${SIZE} > ${LIMIT}) — see TEST_STRATEGY §8.1"
            exit 1
          fi
          if [ "$STATUS" = "warn" ]; then
            echo "::warning::PacketTunnel approaching 20 MB ceiling (${MB} MB > 18 MB soft warning)"
          fi
